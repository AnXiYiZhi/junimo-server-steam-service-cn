name: Release Steam Service CN Image From Manual Tag

on:
  push:
    tags:
      - "sdvd-server-v*-anxi.*"

permissions: {}

jobs:
  release:
    name: Publish manually-created fork tag
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/publish-steam-service.yml
    with:
      fork_tag: ${{ github.ref_name }}
    secrets: inherit
